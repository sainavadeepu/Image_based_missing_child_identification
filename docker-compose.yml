version: "3.9"

services:

  # ── PostgreSQL with pgvector ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: mcis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mcis_db
      POSTGRES_USER: mcis_user
      POSTGRES_PASSWORD: mcis_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mcis_user -d mcis_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mcis_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://mcis_user:mcis_password@db:5432/mcis_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DEBUG: "false"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - ./models/.insightface:/root/.insightface
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  uploads_data:
  models_data:
